telegram:
  api_id: 12345678                    # Get from https://my.telegram.org
  api_hash: "your_api_hash_here"
  phone: "+1234567890"
  channel_id: -1003488226342          # Signal channel ID
  session_file: "session/telegram.session"

iqoption:
  email: "your_email@example.com"
  password: "your_password"
  demo_mode: true                     # Always start with demo!

trading:
  default_amount: 2.0                 # Trade amount per signal
  max_concurrent_trades: 3
  min_balance: 100.0
  trade_delay_ms: 2000
  max_daily_loss: 50.0

risk:
  enabled: true
  max_trades_per_day: 0                # 0 = unlimited, set to e.g. 50 to cap daily trades
  min_signal_confidence: 0.7
  martingale: true                     # re-enter on loss at next martingale level
  martingale_max: 3                    # max levels to follow (1-3)

analyzer:
  signal_threshold: 4       # Min factors agreeing (3-9, lower = more signals, higher = better quality)
  interval_seconds: 60      # Analysis interval in seconds
  signal_cooldown: 7        # Minutes between signals for same asset
  expiry_seconds: 30        # Trade expiry: 30=30s, 60=1min, 120=2min, 300=5min
  assets:
    # Forex OTC (24/7)
    - EURUSD
    - GBPUSD
    - AUDUSD
    - USDJPY
    - USDCAD
    - USDCHF
    - EURJPY
    - GBPJPY
    # Crypto OTC
    - BTCUSD
    - ETHUSD
    - XRPUSD
    # Stocks OTC
    - OPENAI
    - TESLA
    - APPLE
    - AMAZON
    # Indices OTC
    - SP500
    - US30
    # Commodities OTC
    - XAUUSD

logging:
  level: "info"                       # debug / info / warn / error
  file: "logs/bot.log"
  console: true

database:
  path: "data/trades.db"
