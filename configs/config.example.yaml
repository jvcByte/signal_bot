# ─────────────────────────────────────────────────────────────────
# Signal Bot — Configuration Example
# Copy to config.yaml and fill in your credentials.
# ─────────────────────────────────────────────────────────────────

telegram:
  api_id: 12345678              # Get from https://my.telegram.org
  api_hash: "your_api_hash"
  phone: "+1234567890"
  channel_id: -1003488226342    # Mexy Binary channel ID
  session_file: "session/telegram.session"

iqoption:
  email: "your@email.com"
  password: "your_password"
  demo_mode: true               # ⚠️  Always test on demo first!

trading:
  default_amount: 1.0           # Trade size ($)
  max_concurrent_trades: 3
  min_balance: 30.0             # Pause if balance drops below this
  trade_delay_ms: 2000
  max_daily_loss: 50.0

risk:
  enabled: true
  max_trades_per_day: 0         # 0 = unlimited
  min_signal_confidence: 0.60   # Minimum confidence to execute (0.0–1.0)
  martingale: true              # Double stake after a loss
  martingale_max: 3             # Max martingale levels (0 = no cap)

logging:
  level: "info"                 # debug / info / warn / error
  file: "logs/bot.log"
  console: true

database:
  path: "data/trades.db"
