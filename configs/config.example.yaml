telegram:
  api_id: 12345678                    # Get from https://my.telegram.org
  api_hash: "your_api_hash_here"
  phone: "+1234567890"
  channel_id: -1003488226342          # Signal channel ID
  session_file: "session/telegram.session"

iqoption:
  email: "your_email@example.com"
  password: "your_password"
  demo_mode: true                     # Always start with demo!

trading:
  default_amount: 2.0                 # Trade amount per signal
  max_concurrent_trades: 3
  min_balance: 100.0
  trade_delay_ms: 2000
  max_daily_loss: 50.0

risk:
  enabled: true
  max_trades_per_hour: 30
  min_signal_confidence: 0.7          # Minimum AI confidence (0.0-1.0)

logging:
  level: "info"                       # debug / info / warn / error
  file: "logs/bot.log"
  console: true

database:
  path: "data/trades.db"
