telegram:
  api_id: 12345678
  api_hash: "your_api_hash_here"
  phone: "+1234567890"
  channel_id: -1003488226342
  session_file: "session/telegram.session"

iqoption:
  email: "your_email@example.com"
  password: "your_password"
  demo_mode: true
  base_url: "https://iqoption.com/traderoom"
  headless: false  # Keep false to see the browser and calibrate coordinates
  cookies_file: "session/iqoption_cookies.json"
  
  # Canvas UI Coordinates (IQ Option uses canvas, not HTML elements)
  # To calibrate: Run bot, take screenshot, use image editor to find pixel coordinates
  # Default values for 1280x800 resolution - YOU MUST CALIBRATE THESE!
  coordinates:
    asset_x: 150    # Click here to open asset selector
    asset_y: 50     # Then type asset name and press Enter
    expiry_x: 300   # Click here to open expiry dropdown
    expiry_y: 100   # (Or pre-select expiry manually before running bot)
    amount_x: 640   # Click here to focus amount input field
    amount_y: 400   # Then type amount value
    call_x: 500     # Click here for CALL/BUY (green up button)
    call_y: 650
    put_x: 780      # Click here for PUT/SELL (red down button)
    put_y: 650

trading:
  default_amount: 10.0
  max_concurrent_trades: 3
  min_balance: 100.0
  trade_delay_ms: 2000
  max_daily_loss: 50.0

risk:
  enabled: true
  max_trades_per_day: 0     # 0 = unlimited, set to e.g. 50 to cap daily trades
  min_signal_confidence: 0.7

logging:
  level: "info"
  file: "logs/bot.log"
  console: true

database:
  path: "data/trades.db"
